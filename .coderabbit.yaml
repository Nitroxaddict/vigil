language: en
reviews:
  auto_review:
    # Disabled 2026-05-03: PR review is now handled by the Reviewer agent
    # in the self-hosted Multica workspace, which reviews against the
    # approved plan rather than generic best-practice criteria. Flip back
    # to true to re-enable CodeRabbit auto-review.
    enabled: false
    drafts: false
  path_instructions:
    - path: "pkg/**/*.go"
      instructions: "Focus on Docker SDK compatibility, container lifecycle safety, and backward compatibility with Watchtower labels/env vars."
    - path: "internal/**/*.go"
      instructions: "Check for breaking changes to CLI flags and environment variable handling. Vigil must support both VIGIL_* and WATCHTOWER_* env vars."
  request_changes_workflow: false
  high_level_summary: true
  poem: false
chat:
  auto_reply: true
