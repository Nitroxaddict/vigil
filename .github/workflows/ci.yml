name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Update dependencies
        run: |
          go get github.com/docker/docker@v27.5.1+incompatible
          go get github.com/docker/cli@v27.5.1+incompatible
          go mod tidy

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...
