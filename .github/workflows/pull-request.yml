name: Pull Request

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: dominikh/staticcheck-action@v1
        with:
          version: "2024.1.1"
          install-go: "false"
  test:
    name: Test
    strategy:
      fail-fast: false
      matrix:
        platform:
          - ubuntu-latest
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Update Docker SDK
        run: |
          go get github.com/docker/docker@v27.5.1+incompatible
          go get github.com/docker/cli@v27.5.1+incompatible
          go mod tidy
      - name: Run tests
        run: |
          go test -v -coverprofile coverage.out -covermode atomic ./...
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Update Docker SDK
        run: |
          go get github.com/docker/docker@v27.5.1+incompatible
          go get github.com/docker/cli@v27.5.1+incompatible
          go mod tidy
      - name: Build
        run: go build -v -ldflags "-s -w" ./...
